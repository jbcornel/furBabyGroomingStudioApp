<!-- Fixed navbar — emits openContact when "Contact Now" is clicked -->
<app-navbar (openContact)="openContactModal()"></app-navbar>

<!-- Page content — padded below fixed navbar -->
<div class="fb-page-wrapper">
  <router-outlet />
</div>

<!-- Contact Now modal — controlled by root signal -->
<app-contact-modal
  [isOpen]="contactModalOpen()"
  (closeModal)="closeContactModal()"
></app-contact-modal>
