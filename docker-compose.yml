
version: '3.9'

services:

  frontend:
    build:
      context: ./furBabyGrooming-frontend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
    depends_on:
      - mailer
    restart: unless-stopped

  mailer:
    build:
      context: ./mailer-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./mailer-server/.env
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:4000
    restart: unless-stopped
